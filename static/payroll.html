<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-Tech — Payroll</title>
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="/static/shared.css">
<style>
.pay-components-panel{display:none;background:#f7fafc;border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:8px}
.pay-components-panel.open{display:block}
.comp-type-badge.allowance{background:#f0fff4;color:var(--green)}
.comp-type-badge.deduction{background:#fff5f5;color:var(--red)}
.comp-type-badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
</style>
</head>
<body>
<div id="layout-root"></div>

<main class="page-main">
  <div class="tab-bar">
    <button class="tab-btn" data-tab="payroll" onclick="switchTab('payroll')">Employees</button>
    <button class="tab-btn" data-tab="runs"    onclick="switchTab('runs')">Payroll Runs</button>
  </div>

  <!-- ── EMPLOYEES ──────────────────────────────────────────────────────────── -->
  <div class="tab-panel" id="tab-payroll">
    <div class="section-card">
      <div class="section-header">
        <div class="section-title">Employees</div>
        <div class="section-actions">
          <input type="text" class="search-input" id="emp-search" placeholder="Search employees…" oninput="renderEmployees()">
          <button class="btn btn-sm btn-primary" onclick="openEmployeeModal()">+ New Employee</button>
        </div>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>Name</th><th>Job Title</th><th>Department</th><th>Employment Type</th><th class="r">Basic Salary</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="employees-body"><tr><td colspan="7"><div class="empty-state"><div class="empty-icon">👤</div><div class="empty-title">Loading…</div></div></td></tr></tbody>
        </table>
      </div>
    </div>
    <div id="pay-components-container"></div>
  </div>

  <!-- ── PAYROLL RUNS ───────────────────────────────────────────────────────── -->
  <div class="tab-panel" id="tab-runs">
    <div class="section-card">
      <div class="section-header">
        <div class="section-title">Payroll Runs</div>
        <div class="section-actions">
          <button class="btn btn-sm btn-primary" onclick="openRunModal()">+ New Payroll Run</button>
        </div>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>Period Name</th><th>Start Date</th><th>End Date</th><th class="r">Total Gross</th><th class="r">Total Net</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="runs-body"><tr><td colspan="7"><div class="empty-state"><div class="empty-icon">📅</div><div class="empty-title">Loading…</div></div></td></tr></tbody>
        </table>
      </div>
    </div>
    <div id="run-detail-container"></div>
  </div>
</main>

<!-- ── EMPLOYEE MODAL ─────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="employee-modal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <div class="modal-title" id="emp-modal-title">New Employee</div>
      <button class="modal-close" onclick="closeModal('employee-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div id="emp-modal-error" class="error-msg" style="display:none"></div>
      <div class="field-row">
        <div class="field"><label>First Name *</label><input type="text" id="emp-first-name" placeholder="John"></div>
        <div class="field"><label>Last Name *</label><input type="text" id="emp-last-name" placeholder="Doe"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Email</label><input type="email" id="emp-email" placeholder="john@company.com"></div>
        <div class="field"><label>Phone</label><input type="text" id="emp-phone" placeholder="+1 234 567 8900"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Job Title</label><input type="text" id="emp-job-title" placeholder="Accountant"></div>
        <div class="field"><label>Department</label><input type="text" id="emp-department" placeholder="Finance"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Employment Type</label>
          <select id="emp-emp-type">
            <option value="full_time">Full Time</option>
            <option value="part_time">Part Time</option>
            <option value="contract">Contract</option>
            <option value="casual">Casual</option>
          </select>
        </div>
        <div class="field"><label>Start Date</label><input type="date" id="emp-start-date"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Basic Salary *</label><input type="number" id="emp-basic-salary" step="0.01" min="0" placeholder="0.00"></div>
        <div class="field"><label>Pay Frequency</label>
          <select id="emp-pay-freq">
            <option value="monthly">Monthly</option>
            <option value="weekly">Weekly</option>
            <option value="fortnightly">Fortnightly</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field"><label>Tax Reference</label><input type="text" id="emp-tax-ref" placeholder="Tax ID / PAYE Number"></div>
        <div class="field"><label>National ID</label><input type="text" id="emp-national-id" placeholder="National ID Number"></div>
      </div>
      <div class="field"><label>Bank Account Details</label><input type="text" id="emp-bank-details" placeholder="Bank Name — Account Number"></div>
      <div class="field"><label>Notes</label><textarea id="emp-notes" rows="2" style="resize:vertical"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('employee-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveEmployee()" id="emp-save-btn">Save Employee</button>
    </div>
  </div>
</div>

<!-- ── PAY COMPONENT MODAL ────────────────────────────────────────────────── -->
<div class="modal-overlay" id="comp-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add Pay Component</div>
      <button class="modal-close" onclick="closeModal('comp-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div id="comp-modal-error" class="error-msg" style="display:none"></div>
      <div class="field-row">
        <div class="field"><label>Component Name *</label><input type="text" id="comp-name" placeholder="e.g. Housing Allowance, PAYE Tax"></div>
        <div class="field"><label>Type *</label>
          <select id="comp-type">
            <option value="allowance">Allowance (adds to pay)</option>
            <option value="deduction">Deduction (reduces pay)</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field"><label>Amount *</label><input type="number" id="comp-amount" step="0.01" min="0" placeholder="0.00"></div>
        <div class="field"><label>Is Percentage?</label>
          <select id="comp-is-pct">
            <option value="false">No — Fixed Amount</option>
            <option value="true">Yes — % of Basic Salary</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('comp-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="savePayComponent()" id="comp-save-btn">Add Component</button>
    </div>
  </div>
</div>

<!-- ── PAYROLL RUN MODAL ──────────────────────────────────────────────────── -->
<div class="modal-overlay" id="run-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">New Payroll Run</div>
      <button class="modal-close" onclick="closeModal('run-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div id="run-modal-error" class="error-msg" style="display:none"></div>
      <div class="field"><label>Period Name *</label><input type="text" id="run-period-name" placeholder="e.g. January 2026 Payroll"></div>
      <div class="field-row">
        <div class="field"><label>Pay Period Start *</label><input type="date" id="run-start-date"></div>
        <div class="field"><label>Pay Period End *</label><input type="date" id="run-end-date"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('run-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveRun()" id="run-save-btn">Create Run</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/static/shared.js"></script>
<script>
let allEmployees = [];
let allRuns = [];
let editingEmployeeId = null;
let currentCompEmpId  = null;
let empComponents     = {};

(async function() {
  if (!authGuard()) return;
  renderLayout('payroll', 'Payroll');
  initTabs('payroll');
  await Promise.all([loadEmployees(), loadRuns()]);
})();

async function loadEmployees() {
  const data = await api('GET', '/api/employees');
  if (!data) return;
  allEmployees = Array.isArray(data) ? data : (data.employees || data.items || []);
  renderEmployees();
}

async function loadRuns() {
  const data = await api('GET', '/api/payroll-runs');
  if (!data) return;
  allRuns = Array.isArray(data) ? data : (data.runs || data.items || []);
  renderRuns();
}

function renderEmployees() {
  const search = (document.getElementById('emp-search').value||'').toLowerCase();
  let rows = allEmployees.filter(e =>
    !search || (e.first_name+' '+e.last_name).toLowerCase().includes(search) ||
    (e.job_title||'').toLowerCase().includes(search)
  );
  const tbody = document.getElementById('employees-body');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">👤</div><div class="empty-title">No employees found</div></div></td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(e => `<tr>
    <td><strong>${esc(e.first_name)} ${esc(e.last_name)}</strong></td>
    <td>${esc(e.job_title||'—')}</td>
    <td>${esc(e.department||'—')}</td>
    <td><span class="badge info">${(e.employment_type||'').replace('_',' ')}</span></td>
    <td class="r">${fmt(e.basic_salary||0)}</td>
    <td><span class="badge ${e.status==='active'?'posted':'muted'}">${e.status||'active'}</span></td>
    <td>
      <button class="btn btn-xs btn-outline" onclick="editEmployee(${e.id})">Edit</button>
      <button class="btn btn-xs btn-gold" onclick="togglePayComponents(${e.id})" style="margin-left:4px">Pay Components</button>
    </td>
  </tr>`).join('');
}

function renderRuns() {
  const tbody = document.getElementById('runs-body');
  if (!allRuns.length) {
    tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">📅</div><div class="empty-title">No payroll runs yet</div></div></td></tr>';
    return;
  }
  tbody.innerHTML = allRuns.map(r => `<tr>
    <td><strong>${esc(r.period_name||r.name||'')}</strong></td>
    <td>${dateStr(r.start_date)}</td>
    <td>${dateStr(r.end_date)}</td>
    <td class="r">${fmt(r.total_gross||0)}</td>
    <td class="r">${fmt(r.total_net||0)}</td>
    <td><span class="badge ${r.status==='approved'?'posted':r.status==='void'?'void':'draft'}">${r.status||'draft'}</span></td>
    <td>
      <button class="btn btn-xs btn-outline" onclick="viewRunDetail(${r.id})">Detail</button>
      ${r.status !== 'approved' ? `<button class="btn btn-xs btn-success" onclick="approveRun(${r.id})" style="margin-left:4px">Approve</button>` : ''}
      <button class="btn btn-xs btn-outline" onclick="printPayslips(${r.id})" style="margin-left:4px">Payslips</button>
    </td>
  </tr>`).join('');
}

function openEmployeeModal() {
  editingEmployeeId = null;
  document.getElementById('emp-modal-title').textContent = 'New Employee';
  ['emp-first-name','emp-last-name','emp-email','emp-phone','emp-job-title','emp-department',
   'emp-tax-ref','emp-national-id','emp-bank-details','emp-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('emp-basic-salary').value = '';
  document.getElementById('emp-emp-type').value = 'full_time';
  document.getElementById('emp-pay-freq').value = 'monthly';
  document.getElementById('emp-start-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('emp-modal-error').style.display = 'none';
  openModal('employee-modal');
}

function editEmployee(id) {
  const e = allEmployees.find(x => x.id === id);
  if (!e) return;
  editingEmployeeId = id;
  document.getElementById('emp-modal-title').textContent = 'Edit Employee';
  document.getElementById('emp-first-name').value = e.first_name || '';
  document.getElementById('emp-last-name').value = e.last_name || '';
  document.getElementById('emp-email').value = e.email || '';
  document.getElementById('emp-phone').value = e.phone || '';
  document.getElementById('emp-job-title').value = e.job_title || '';
  document.getElementById('emp-department').value = e.department || '';
  document.getElementById('emp-emp-type').value = e.employment_type || 'full_time';
  document.getElementById('emp-start-date').value = e.start_date || '';
  document.getElementById('emp-basic-salary').value = e.basic_salary || '';
  document.getElementById('emp-pay-freq').value = e.pay_frequency || 'monthly';
  document.getElementById('emp-tax-ref').value = e.tax_reference || '';
  document.getElementById('emp-national-id').value = e.national_id || '';
  document.getElementById('emp-bank-details').value = e.bank_details || '';
  document.getElementById('emp-notes').value = e.notes || '';
  document.getElementById('emp-modal-error').style.display = 'none';
  openModal('employee-modal');
}

async function saveEmployee() {
  const errEl = document.getElementById('emp-modal-error');
  errEl.style.display = 'none';
  const first_name = document.getElementById('emp-first-name').value.trim();
  const last_name = document.getElementById('emp-last-name').value.trim();
  const basic_salary = parseFloat(document.getElementById('emp-basic-salary').value);
  if (!first_name || !last_name) {
    errEl.textContent = 'First and last name are required.'; errEl.style.display='block'; return;
  }
  const payload = {
    first_name, last_name,
    email: document.getElementById('emp-email').value.trim() || null,
    phone: document.getElementById('emp-phone').value.trim() || null,
    job_title: document.getElementById('emp-job-title').value.trim() || null,
    department: document.getElementById('emp-department').value.trim() || null,
    employment_type: document.getElementById('emp-emp-type').value,
    start_date: document.getElementById('emp-start-date').value || null,
    basic_salary: basic_salary || 0,
    pay_frequency: document.getElementById('emp-pay-freq').value,
    tax_reference: document.getElementById('emp-tax-ref').value.trim() || null,
    national_id: document.getElementById('emp-national-id').value.trim() || null,
    bank_details: document.getElementById('emp-bank-details').value.trim() || null,
    notes: document.getElementById('emp-notes').value.trim() || null,
  };
  const btn = document.getElementById('emp-save-btn');
  btn.disabled = true;
  const result = editingEmployeeId
    ? await api('PUT', `/api/employees/${editingEmployeeId}`, payload)
    : await api('POST', '/api/employees', payload);
  btn.disabled = false;
  if (!result) return;
  toast(editingEmployeeId ? 'Employee updated' : 'Employee created', 'success');
  closeModal('employee-modal');
  await loadEmployees();
}

// ── PAY COMPONENTS ─────────────────────────────────────────────────────────────
async function togglePayComponents(empId) {
  const container = document.getElementById('pay-components-container');
  if (currentCompEmpId === empId && container.innerHTML) {
    container.innerHTML = '';
    currentCompEmpId = null;
    return;
  }
  currentCompEmpId = empId;
  await loadPayComponents(empId);
}

async function loadPayComponents(empId) {
  const emp = allEmployees.find(e => e.id === empId);
  const data = await api('GET', `/api/employees/${empId}/pay-components`);
  if (!data) return;
  const comps = Array.isArray(data) ? data : (data.components || []);
  empComponents[empId] = comps;
  const container = document.getElementById('pay-components-container');

  const compRows = comps.length
    ? comps.map(c => `<tr>
        <td>${esc(c.name)}</td>
        <td><span class="comp-type-badge ${c.type}">${c.type}</span></td>
        <td class="r">${c.is_percentage ? `${c.amount}%` : fmt(c.amount)}</td>
        <td><button class="btn btn-xs btn-danger" onclick="deletePayComponent(${c.id}, ${empId})">Remove</button></td>
      </tr>`).join('')
    : '<tr><td colspan="4" style="text-align:center;color:var(--muted);font-style:italic;padding:16px">No pay components yet</td></tr>';

  container.innerHTML = `
    <div class="section-card" style="margin-top:16px">
      <div class="section-header">
        <div class="section-title">Pay Components — ${esc(emp?.first_name||'')} ${esc(emp?.last_name||'')}</div>
        <div class="section-actions">
          <button class="btn btn-sm btn-outline" onclick="openCompModal(${empId})">+ Add Component</button>
          <button class="btn btn-sm btn-outline" onclick="document.getElementById('pay-components-container').innerHTML='';currentCompEmpId=null">Close</button>
        </div>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>Name</th><th>Type</th><th class="r">Amount</th><th>Actions</th></tr></thead>
          <tbody>${compRows}</tbody>
        </table>
      </div>
    </div>
  `;
}

function openCompModal(empId) {
  currentCompEmpId = empId;
  document.getElementById('comp-modal-error').style.display = 'none';
  document.getElementById('comp-name').value = '';
  document.getElementById('comp-type').value = 'allowance';
  document.getElementById('comp-amount').value = '';
  document.getElementById('comp-is-pct').value = 'false';
  openModal('comp-modal');
}

async function savePayComponent() {
  const errEl = document.getElementById('comp-modal-error');
  errEl.style.display = 'none';
  const name = document.getElementById('comp-name').value.trim();
  const amount = parseFloat(document.getElementById('comp-amount').value);
  if (!name || !amount || amount <= 0) {
    errEl.textContent = 'Name and a positive amount are required.'; errEl.style.display='block'; return;
  }
  const payload = {
    name,
    type: document.getElementById('comp-type').value,
    amount,
    is_percentage: document.getElementById('comp-is-pct').value === 'true',
  };
  const btn = document.getElementById('comp-save-btn');
  btn.disabled = true;
  const result = await api('POST', `/api/employees/${currentCompEmpId}/pay-components`, payload);
  btn.disabled = false;
  if (!result) return;
  toast('Pay component added', 'success');
  closeModal('comp-modal');
  await loadPayComponents(currentCompEmpId);
}

async function deletePayComponent(compId, empId) {
  if (!confirm('Remove this pay component?')) return;
  const result = await api('DELETE', `/api/pay-components/${compId}`);
  if (result === null) return;
  toast('Component removed', 'success');
  await loadPayComponents(empId);
}

// ── PAYROLL RUNS ───────────────────────────────────────────────────────────────
function openRunModal() {
  document.getElementById('run-modal-error').style.display = 'none';
  document.getElementById('run-period-name').value = '';
  const now = new Date();
  const firstOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
  const lastOfMonth  = new Date(now.getFullYear(), now.getMonth()+1, 0).toISOString().split('T')[0];
  document.getElementById('run-start-date').value = firstOfMonth;
  document.getElementById('run-end-date').value   = lastOfMonth;
  const monthName = now.toLocaleString('default',{month:'long'});
  document.getElementById('run-period-name').value = `${monthName} ${now.getFullYear()} Payroll`;
  openModal('run-modal');
}

async function saveRun() {
  const errEl = document.getElementById('run-modal-error');
  errEl.style.display = 'none';
  const period_name = document.getElementById('run-period-name').value.trim();
  const start_date  = document.getElementById('run-start-date').value;
  const end_date    = document.getElementById('run-end-date').value;
  if (!period_name || !start_date || !end_date) {
    errEl.textContent = 'All fields are required.'; errEl.style.display='block'; return;
  }
  const btn = document.getElementById('run-save-btn');
  btn.disabled = true;
  const result = await api('POST', '/api/payroll-runs', { period_name, start_date, end_date });
  btn.disabled = false;
  if (!result) return;
  toast('Payroll run created', 'success');
  closeModal('run-modal');
  await loadRuns();
}

async function approveRun(id) {
  if (!confirm('Approve this payroll run? This will post journal entries.')) return;
  const result = await api('POST', `/api/payroll-runs/${id}/approve`);
  if (!result) return;
  toast('Payroll run approved', 'success');
  await loadRuns();
}

async function viewRunDetail(id) {
  const data = await api('GET', `/api/payroll-runs/${id}`);
  if (!data) return;
  const run = allRuns.find(r => r.id === id) || data;
  const lines = (data.lines || data.employees || []);
  const container = document.getElementById('run-detail-container');

  const empRows = lines.map(l => `<tr>
    <td>${esc(l.employee_name||l.first_name+' '+l.last_name||'')}</td>
    <td class="r">${fmt(l.basic_salary||0)}</td>
    <td class="r" style="color:var(--green)">${fmt(l.total_allowances||0)}</td>
    <td class="r">${fmt(l.gross_pay||0)}</td>
    <td class="r" style="color:var(--red)">${fmt(l.total_deductions||0)}</td>
    <td class="r" style="font-weight:700;color:var(--navy)">${fmt(l.net_pay||0)}</td>
    <td><button class="btn btn-xs btn-outline" onclick="printPayslip(${JSON.stringify(l).replace(/"/g,'&quot;')})">Payslip</button></td>
  </tr>`).join('') || '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:16px">No employee data</td></tr>';

  container.innerHTML = `
    <div class="section-card" style="margin-top:16px">
      <div class="section-header">
        <div class="section-title">Run Detail — ${esc(run.period_name||run.name||'')}</div>
        <div class="section-actions">
          <button class="btn btn-sm btn-outline" onclick="document.getElementById('run-detail-container').innerHTML=''">Close</button>
        </div>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>Employee</th><th class="r">Basic Salary</th><th class="r">Allowances</th><th class="r">Gross Pay</th><th class="r">Deductions</th><th class="r">Net Pay</th><th>Actions</th></tr></thead>
          <tbody>${empRows}</tbody>
        </table>
      </div>
      <div style="text-align:right;margin-top:12px;font-weight:700;font-size:14px">
        Total Gross: <span style="color:var(--navy)">${fmt(data.total_gross||run.total_gross||0)}</span> &nbsp;|&nbsp;
        Total Net: <span style="color:var(--green)">${fmt(data.total_net||run.total_net||0)}</span>
      </div>
    </div>
  `;
}

async function printPayslips(runId) {
  const data = await api('GET', `/api/payroll-runs/${runId}`);
  if (!data) return;
  const lines = data.lines || data.employees || [];
  if (!lines.length) { toast('No employee data for this run', 'error'); return; }
  const run = allRuns.find(r => r.id === runId) || data;
  const company = S.company || {};
  const w = window.open('', '_blank');
  const slipHTML = lines.map(l => `
    <div style="page-break-after:always;padding:30px;border:2px solid #1e3a5f;margin:20px 0;font-family:Arial,sans-serif;font-size:12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:20px">
        <div><div style="font-size:20px;font-weight:bold;color:#1e3a5f">${esc(company.name||'T-Tech')}</div><div style="font-size:11px;color:#718096">PAYSLIP</div></div>
        <div style="text-align:right"><div>Period: ${esc(run.period_name||run.name||'')}</div><div>${dateStr(run.start_date)} — ${dateStr(run.end_date)}</div></div>
      </div>
      <div style="margin-bottom:16px"><div><strong>Employee:</strong> ${esc(l.employee_name||l.first_name+' '+(l.last_name||''))}</div></div>
      <table style="width:100%;border-collapse:collapse;margin-bottom:16px">
        <thead><tr style="background:#1e3a5f;color:#fff"><th style="padding:8px;text-align:left">Earnings</th><th style="padding:8px;text-align:right">Amount</th></tr></thead>
        <tbody>
          <tr><td style="padding:6px;border-bottom:1px solid #eee">Basic Salary</td><td style="padding:6px;border-bottom:1px solid #eee;text-align:right">${fmt(l.basic_salary||0)}</td></tr>
          ${(l.allowances||[]).map(a => `<tr><td style="padding:6px;border-bottom:1px solid #eee;color:green">${esc(a.name)}</td><td style="padding:6px;border-bottom:1px solid #eee;text-align:right;color:green">+${fmt(a.amount||0)}</td></tr>`).join('')}
          <tr style="font-weight:bold;background:#f0fff4"><td style="padding:8px">Gross Pay</td><td style="padding:8px;text-align:right">${fmt(l.gross_pay||0)}</td></tr>
        </tbody>
      </table>
      <table style="width:100%;border-collapse:collapse;margin-bottom:16px">
        <thead><tr style="background:#c53030;color:#fff"><th style="padding:8px;text-align:left">Deductions</th><th style="padding:8px;text-align:right">Amount</th></tr></thead>
        <tbody>
          ${(l.deductions||[]).map(d => `<tr><td style="padding:6px;border-bottom:1px solid #eee;color:#c53030">${esc(d.name)}</td><td style="padding:6px;border-bottom:1px solid #eee;text-align:right;color:#c53030">−${fmt(d.amount||0)}</td></tr>`).join('') || '<tr><td colspan="2" style="padding:8px;text-align:center;color:#718096">No deductions</td></tr>'}
          <tr style="font-weight:bold;background:#fff5f5"><td style="padding:8px">Total Deductions</td><td style="padding:8px;text-align:right;color:#c53030">${fmt(l.total_deductions||0)}</td></tr>
        </tbody>
      </table>
      <div style="background:#1e3a5f;color:#fff;padding:16px;border-radius:8px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:16px;font-weight:bold">NET PAY</span>
        <span style="font-size:22px;font-weight:bold">${fmt(l.net_pay||0)}</span>
      </div>
    </div>
  `).join('');
  w.document.write(`<!DOCTYPE html><html><head><title>Payslips — ${esc(run.period_name||run.name||'')}</title>
    <style>body{margin:0;padding:20px;font-family:Arial,sans-serif}@media print{.no-print{display:none}}</style></head>
    <body><div class="no-print" style="margin-bottom:20px"><button onclick="window.print()" style="padding:10px 20px;background:#1e3a5f;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px">Print All Payslips</button></div>
    ${slipHTML}</body></html>`);
  w.document.close();
}

function printPayslip(empData) {
  let l;
  try { l = typeof empData === 'string' ? JSON.parse(empData) : empData; }
  catch { return; }
  const company = S.company || {};
  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>Payslip</title>
    <style>body{font-family:Arial,sans-serif;padding:30px;font-size:12px}
    table{width:100%;border-collapse:collapse}th,td{padding:8px;border:1px solid #eee;text-align:left}</style>
    </head><body>
    <div style="display:flex;justify-content:space-between;margin-bottom:20px">
      <div><div style="font-size:20px;font-weight:bold;color:#1e3a5f">${esc(company.name||'T-Tech')}</div><div>PAYSLIP</div></div>
    </div>
    <div style="margin-bottom:16px"><strong>Employee:</strong> ${esc(l.employee_name||l.first_name+' '+(l.last_name||''))}</div>
    <table>
      <thead><tr style="background:#1e3a5f;color:#fff"><th>Description</th><th>Amount</th></tr></thead>
      <tbody>
        <tr><td>Basic Salary</td><td>${fmt(l.basic_salary||0)}</td></tr>
        <tr><td>Total Allowances</td><td style="color:green">+${fmt(l.total_allowances||0)}</td></tr>
        <tr><td><strong>Gross Pay</strong></td><td><strong>${fmt(l.gross_pay||0)}</strong></td></tr>
        <tr><td>Total Deductions</td><td style="color:red">−${fmt(l.total_deductions||0)}</td></tr>
        <tr style="background:#f0f4f8"><td><strong>NET PAY</strong></td><td><strong style="font-size:16px">${fmt(l.net_pay||0)}</strong></td></tr>
      </tbody>
    </table>
    </body></html>`);
  w.document.close();
  w.print();
}
</script>
